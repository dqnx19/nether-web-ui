<svg
  width="64"
  height="64"
  viewBox="0 0 64 64"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="i18n icon"
>
  <!-- Bigger blue globe -->
  <circle cx="32" cy="28" r="18" stroke="#3B82F6" stroke-width="2.5" fill="none"/>

  <!-- Latitude lines -->
  <path d="M14 28h36" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  <path d="M18 20c5 3 10 4 14 4s9-1 14-4" stroke="#3B82F6" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M18 36c5-3 10-4 14-4s9 1 14 4" stroke="#3B82F6" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- Longitude lines -->
  <ellipse cx="32" cy="28" rx="8" ry="18" stroke="#3B82F6" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- i18n badge -->
  <rect x="20" y="43" width="24" height="14" rx="4" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
  <text
    x="32"
    y="54"
    text-anchor="middle"
    font-family="Inter, system-ui, sans-serif"
    font-size="9"
    fill="#3B82F6"
    font-weight="600"
  >
    i18n
  </text>
</svg>
